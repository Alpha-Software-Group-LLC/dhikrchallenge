:root{
  --bg:#060f0a;

  --text3:#3d6650;

  --amber-mid:rgba(200,168,75,0.2);

  --green:#34b464;
  --green2:#4dd47e;

  --font:'Outfit',sans-serif;
  --serif:'Cormorant Garamond',Georgia,serif;
  --arabic:'Amiri','Lora',serif;
  --body:'Lora',Georgia,serif;

}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow:hidden;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;height:100%;line-height:1.5}
#root{height:100%;overflow:hidden}
::selection{background:var(--amber);color:var(--bg)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--green-dim);border-radius:2px}
button{font-family:var(--font);cursor:pointer;-webkit-tap-highlight-color:transparent}

/* Islamic tech HUD — grid + geometric overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(52,180,100,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(52,180,100,0.03) 1px,transparent 1px);
  background-size:40px 40px;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.4;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(52,180,100,0.07),transparent);
}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes glow{0%,100%{opacity:0.3}50%{opacity:0.7}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.08);opacity:0.7}}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes countPulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes beadDrop{0%{transform:scale(0) translateY(-10px);opacity:0}60%{transform:scale(1.15) translateY(0);opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}
@keyframes starBurst{0%{transform:scale(0) rotate(0deg);opacity:1}100%{transform:scale(2) rotate(180deg);opacity:0}}
@keyframes ripple{0%{transform:scale(1);opacity:0.4}100%{transform:scale(2.5);opacity:0}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.anim-up{animation:fadeUp 0.5s var(--ease) both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}

/* Geometric Islamic star SVG pattern for backgrounds */
.geo-pattern{
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 25 L55 30 L35 35 L30 55 L25 35 L5 30 L25 25Z' fill='none' stroke='rgba(52,180,100,0.07)' stroke-width='0.5'/%3E%3C/svg%3E");
  background-size:60px 60px;
}

const getRank=(xp)=>{
  let rank=RANKS[0];
  for(const r of RANKS){if(xp>=r.min)rank=r;else break;}
  const next=RANKS[RANKS.indexOf(rank)+1];
  const progress=next?((xp-rank.min)/(next.min-rank.min)):1;
  return{...rank,progress:Math.min(progress,1),next};
};

// ═════════════════════════════════════════════════════════════════════
// GEOMETRIC ISLAMIC STAR COMPONENT
// ═════════════════════════════════════════════════════════════════════
function IslamicStar({size=120,progress=0,color="var(--amber)",children}){
  const points=8;
  const outerR=size/2;
  const innerR=outerR*0.45;
  const cx=size/2,cy=size/2;
  let path="";
  for(let i=0;i<points;i++){
    const outerAngle=(Math.PI*2/points)*i - Math.PI/2;
    const innerAngle=outerAngle + Math.PI/points;
    const ox=cx+Math.cos(outerAngle)*outerR;
    const oy=cy+Math.sin(outerAngle)*outerR;
    const ix=cx+Math.cos(innerAngle)*innerR;
    const iy=cy+Math.sin(innerAngle)*innerR;
    path+=(i===0?"M":"L")+`${ox},${oy} L${ix},${iy} `;
  }
  path+="Z";
  const pathLen=size*8; // approximate
  const dashOff=pathLen*(1-progress);

  return(
    <div style={{position:"relative",width:size,height:size}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <path d={path} fill="none" stroke="var(--border2)" strokeWidth="1.5"/>
        <path d={path} fill="none" stroke={color} strokeWidth="2"
          strokeDasharray={pathLen} strokeDashoffset={dashOff}
          strokeLinejoin="round"
          style={{transition:"stroke-dashoffset 1s var(--ease)",filter:`drop-shadow(0 0 6px ${color})`}}/>
        <path d={path} fill={`${color}`} opacity="0.04"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        {children}
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════
// TASBIH COUNTER
// ═════════════════════════════════════════════════════════════════════
function TasbihCounter({dhikr,onComplete,onClose}){
  const[count,setCount]=useState(0);
  const[ripples,setRipples]=useState([]);
  const[completed,setCompleted]=useState(false);
  const[muted,setMuted]=useState(false);
  const pct=Math.min(count/dhikr.target,1);

  // ── AUDIO ENGINE ──────────────────────────────────────────────────────
  // Arabic: Google Translate TTS (free, no key, real MP3 audio)
  // English: Web Speech API with deepest available voice
  // Audio cached after first fetch so subsequent taps are instant

  const DHIKR_ARABIC={
    astaghfirullah:   "أستغفر الله",
    la_ilaha_illallah:"لا إله إلا الله",
    subhanallah:      "سبحان الله",
    alhamdulillah:    "الحمد لله",
    allahu_akbar:     "الله أكبر",
    salawat:          "اللهم صل على محمد",
    hawqala:          "لا حول ولا قوة إلا بالله",
    quran_reading:    "بسم الله الرحمن الرحيم",
  };

  const DHIKR_ENGLISH={
    astaghfirullah:   "I seek forgiveness from Allah",
    la_ilaha_illallah:"There is no god... but Allah",
    subhanallah:      "Glory be to Allah",
    alhamdulillah:    "All praise is due to Allah",
    allahu_akbar:     "Allah... is the Greatest",
    salawat:          "O Allah... send blessings upon Muhammad",
    hawqala:          "There is no power... nor strength... except with Allah",
    quran_reading:    "In the name of Allah... the Most Gracious... the Most Merciful",
  };

  const audioCache=useRef({});
  const activeAudio=useRef(null);

  // Misbaha bead tap sound
  const playTapClick=()=>{
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      const filter=ctx.createBiquadFilter();
      filter.type="bandpass"; filter.frequency.value=1100; filter.Q.value=4;
      osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      osc.type="triangle"; osc.frequency.value=820;
      gain.gain.setValueAtTime(0.10,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.10);
      osc.start(); osc.stop(ctx.currentTime+0.10);
      setTimeout(()=>{try{ctx.close();}catch(e){}},300);
    }catch(e){}
  };

  useEffect(()=>{
    if(window.speechSynthesis){
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
    }
    return()=>{
      if(window.speechSynthesis) window.speechSynthesis.cancel();
      if(activeAudio.current){ activeAudio.current.pause(); activeAudio.current=null; }
    };
  },[]);

  // Fetch Arabic as real MP3 from Google Translate TTS — no key needed
  const fetchArabicAudio=async(text)=>{
    if(audioCache.current[text]) return audioCache.current[text];
    try{
      const url=`https://translate.google.com/translate_tts?ie=UTF-8&tl=ar&client=tw-ob&q=${encodeURIComponent(text)}`;
      const resp=await fetch(url);
      if(!resp.ok) return null;
      const blob=await resp.blob();
      const objUrl=URL.createObjectURL(blob);
      audioCache.current[text]=objUrl;
      return objUrl;
    }catch(e){ return null; }
  };

  const playAudio=(url,onEnd)=>{
    if(activeAudio.current){ activeAudio.current.pause(); activeAudio.current=null; }
    const a=new Audio(url);
    a.playbackRate=0.82;
    a.volume=1.0;
    a.onended=()=>{ activeAudio.current=null; if(onEnd) onEnd(); };
    a.onerror=()=>{ activeAudio.current=null; if(onEnd) onEnd(); };
    a.play().catch(()=>{ if(onEnd) onEnd(); });
    activeAudio.current=a;
  };

  const getDeepEnglishVoice=()=>{
    const voices=window.speechSynthesis?.getVoices()||[];
    return(
      voices.find(v=>v.name.includes("Daniel"))||
      voices.find(v=>v.name.includes("Alex"))||
      voices.find(v=>v.name.includes("Fred"))||
      voices.find(v=>v.name.includes("David"))||
      voices.find(v=>v.lang==="en-US"&&v.localService)||
      voices.find(v=>v.lang.startsWith("en"))||
      null
    );
  };

  const speakEnglish=(text,onEnd)=>{
    if(!window.speechSynthesis){ if(onEnd) onEnd(); return; }
    window.speechSynthesis.cancel();
    const utt=new SpeechSynthesisUtterance(text);
    utt.lang="en-US"; utt.rate=0.82; utt.pitch=0.65; utt.volume=1.0;
    const voice=getDeepEnglishVoice();
    if(voice) utt.voice=voice;
    let fired=false;
    const done=()=>{ if(!fired){fired=true; if(onEnd) onEnd();} };
    utt.onend=done; utt.onerror=done;
    window.speechSynthesis.speak(utt);
  };

  // Arabic MP3 → 2.5s gap → English Web Speech
  const speakArabicThenEnglish=async(dhikrId,onDone)=>{
    const arabicText=DHIKR_ARABIC[dhikrId]||"";
    const englishText=DHIKR_ENGLISH[dhikrId]||"";
    const arabicUrl=await fetchArabicAudio(arabicText);
    if(arabicUrl){
      playAudio(arabicUrl,()=>{
        setTimeout(()=>speakEnglish(englishText,onDone),2500);
      });
    } else {
      // Fallback: English only if Arabic fetch failed
      speakEnglish(englishText,onDone);
    }
  };

  const playTapAudio=()=>{
    if(muted)return;
    playTapClick();
    setTimeout(()=>speakArabicThenEnglish(dhikr.id,null),80);
  };

  const playCompletionAudio=(onDone)=>{
    if(muted){if(onDone)onDone();return;}
    speakArabicThenEnglish(dhikr.id,onDone);
  };

  const tap=()=>{
    if(completed)return;
    const next=count+1;
    setCount(next);
    setRipples(prev=>[...prev,Date.now()]);
    setTimeout(()=>setRipples(prev=>prev.slice(1)),800);
    playTapAudio();

    if(next>=dhikr.target){
      setCompleted(true);
      setTimeout(()=>{
        playCompletionAudio(()=>setTimeout(()=>onComplete(dhikr),600));
      },200);
    }
  };

  // Vibrate on tap if supported
  const handleTap=()=>{
    if(navigator.vibrate)navigator.vibrate(15);
    tap();
  };

  return(
    <div style={{position:"fixed",inset:0,background:"var(--bg)",backgroundImage:"linear-gradient(rgba(52,180,100,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(52,180,100,0.025) 1px,transparent 1px)",backgroundSize:"40px 40px",zIndex:200,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      {/* Header */}
      <div style={{padding:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={onClose} style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:8,padding:"8px 16px",color:"var(--text2)",fontSize:11,fontFamily:"var(--mono)",letterSpacing:"0.04em",textTransform:"uppercase"}}>← BACK</button>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font)"}}>{dhikr.category}</div>
          <button
            onClick={()=>{
              if(!muted&&window.speechSynthesis)window.speechSynthesis.cancel();
              setMuted(m=>!m);
            }}
            title={muted?"Unmute recitation":"Mute — recite yourself"}
            style={{background:muted?"var(--amber-dim)":"var(--surface)",border:`1px solid ${muted?"var(--amber-mid)":"var(--border2)"}`,borderRadius:8,padding:"6px 10px",fontSize:16,cursor:"pointer",lineHeight:1,transition:"all 0.2s"}}>
            {muted?"🔇":"🔊"}
          </button>
        </div>
      </div>

      {/* Main counter area */}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 24px",position:"relative"}}>
        {/* Background geometric pattern */}
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
          <div style={{width:300,height:300,borderRadius:"50%",border:"1px solid var(--green-mid)",opacity:0.2,animation:"rotate 60s linear infinite"}}/>
          <div style={{position:"absolute",width:220,height:220,borderRadius:"50%",border:"1px dashed var(--green-dim)",opacity:0.45,animation:"rotate 40s linear infinite reverse"}}/>
        </div>

        {/* Arabic text */}
        <div className="anim-up" style={{fontFamily:"var(--arabic)",fontSize:38,color:"var(--green2)",textAlign:"center",marginBottom:8,direction:"rtl",lineHeight:1.4,textShadow:"0 0 20px var(--green-glow)"}}>
          {dhikr.arabic}
        </div>
        <div className="anim-up d1" style={{fontFamily:"var(--mono)",fontSize:13,color:"var(--text2)",letterSpacing:"0.06em",marginBottom:4}}>
          {dhikr.transliteration}
        </div>

// AUTH + PERSISTENCE  (local-first — no backend required)
// Accounts and per-user progress are stored in the browser's localStorage
// so each person can sign in and pick up their dhikr journey over time.
// ═════════════════════════════════════════════════════════════════════
const LS_USERS="dhikr_users_v1";
const LS_SESSION="dhikr_session_v1";

const todayStr=()=>new Date().toISOString().slice(0,10);
const dateNDaysAgo=(n)=>{const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);};

// Lightweight non-cryptographic hash — keeps plaintext passwords out of
// storage. This is a demo-grade safeguard, not real security.
function hashPass(s){
  let h=5381;
  for(let i=0;i<s.length;i++){h=((h<<5)+h)+s.charCodeAt(i);h=h&0xffffffff;}
  return (h>>>0).toString(16);
}

function loadUsers(){try{return JSON.parse(localStorage.getItem(LS_USERS))||{};}catch(e){return{};}}
function saveUsers(u){try{localStorage.setItem(LS_USERS,JSON.stringify(u));}catch(e){}}
function loadSession(){try{return localStorage.getItem(LS_SESSION)||null;}catch(e){return null;}}
function saveSession(email){try{email?localStorage.setItem(LS_SESSION,email):localStorage.removeItem(LS_SESSION);}catch(e){}}

const freshData=()=>({
  streak:0,
  lastActiveDate:null,
  completedToday:[],
  totalCompletions:0,
  xp:0,
  history:[],   // [{date:'YYYY-MM-DD', completions, xp}] — one entry per active day
});

function loadUserData(email){
  const u=loadUsers()[email];
  return u&&u.data?{...freshData(),...u.data}:freshData();
}
function saveUserData(email,data){
  const users=loadUsers();
  if(users[email]){users[email].data=data;saveUsers(users);}
}

// Record one completed dhikr — updates streak, totals, and the daily history.
function registerCompletion(prev,dhikr){
  if(prev.completedToday.includes(dhikr.id)) return prev;
  const today=todayStr();
  const isNewDay=prev.lastActiveDate!==today;
  const streak=isNewDay
    ? (prev.lastActiveDate===dateNDaysAgo(1)?(prev.streak||0)+1:1)
    : (prev.streak||1);
  const history=prev.history.map(h=>({...h}));
  let entry=history.find(h=>h.date===today);
  if(!entry){entry={date:today,completions:0,xp:0};history.push(entry);}
  entry.completions+=1; entry.xp+=dhikr.xp;
  return{
    ...prev,
    completedToday:isNewDay?[dhikr.id]:[...prev.completedToday,dhikr.id],
    lastActiveDate:today,
    streak,
    totalCompletions:prev.totalCompletions+1,
    xp:prev.xp+dhikr.xp,
    history,
  };
}

// LOGIN / CREATE ACCOUNT SCREEN
// ═════════════════════════════════════════════════════════════════════
function LoginScreen({onAuth}){
  const[mode,setMode]=useState("signin");
  const[name,setName]=useState("");
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[err,setErr]=useState("");

  const inputStyle={
    width:"100%",padding:"14px 16px",borderRadius:12,
    background:"var(--surface)",border:"1px solid var(--border2)",
    color:"var(--text)",fontSize:14,fontFamily:"var(--font)",outline:"none",
    marginBottom:12,transition:"border-color 0.2s",
  };

  const submit=()=>{
    setErr("");
    const e=email.trim().toLowerCase();
    if(!e||!pass){setErr("Please enter your email and password.");return;}
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e)){setErr("Please enter a valid email address.");return;}
    const users=loadUsers();
    if(mode==="signup"){
      if(!name.trim()){setErr("Please enter your name.");return;}
      if(pass.length<4){setErr("Password must be at least 4 characters.");return;}
      if(users[e]){setErr("An account with this email already exists — sign in instead.");return;}
      users[e]={name:name.trim(),email:e,pass:hashPass(pass),data:freshData(),created:todayStr()};
      saveUsers(users);
      saveSession(e);
      onAuth(e);
    }else{
      const u=users[e];
      if(!u||u.pass!==hashPass(pass)){setErr("Incorrect email or password.");return;}
      saveSession(e);
      onAuth(e);
    }
  };

  const onKey=(ev)=>{if(ev.key==="Enter")submit();};

  return(
    <div style={{height:"100%",overflowY:"auto",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"32px 24px",maxWidth:480,margin:"0 auto",position:"relative",zIndex:1}}>

      <div className="anim-up" style={{textAlign:"center",marginBottom:28,position:"relative",zIndex:1}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
          <IslamicStar size={92} progress={1} color="var(--amber)">
            <span style={{fontSize:34}}>📿</span>
          </IslamicStar>
        </div>
        <div style={{fontFamily:"var(--arabic)",fontSize:18,color:"var(--amber)",marginBottom:6,direction:"rtl"}}>بِسْمِ ٱللَّهِ</div>
        <div style={{fontFamily:"var(--serif)",fontSize:26,fontWeight:400,letterSpacing:"-0.02em"}}>The Dhikr Challenge</div>
        <div style={{fontSize:13,color:"var(--text2)",marginTop:6,fontFamily:"var(--body)"}}>
          {mode==="signup"?"Create an account to begin your journey":"Sign in to continue your remembrance"}
        </div>
      </div>

      {/* Mode toggle */}
      <div className="anim-up d1" style={{display:"flex",gap:6,background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:12,padding:4,marginBottom:20,width:"100%",maxWidth:340,position:"relative",zIndex:1}}>
        {[{k:"signin",l:"Sign In"},{k:"signup",l:"Create Account"}].map(t=>(
          <button key={t.k} onClick={()=>{setMode(t.k);setErr("");}}
            style={{flex:1,padding:"10px",borderRadius:8,border:"none",fontFamily:"var(--font)",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.2s",
              background:mode===t.k?"var(--amber)":"transparent",
              color:mode===t.k?"var(--bg)":"var(--text2)"}}>
            {t.l}
          </button>
        ))}
      </div>

      <div className="anim-up d2" style={{width:"100%",maxWidth:340,position:"relative",zIndex:1}}>
        {mode==="signup"&&(
          <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={onKey}
            placeholder="Your name" autoComplete="name"
            onFocus={e=>e.target.style.borderColor="var(--amber-mid)"}
            onBlur={e=>e.target.style.borderColor="var(--border2)"}
            style={inputStyle}/>
        )}
        <input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={onKey}
          placeholder="Email" type="email" autoComplete="email"
          onFocus={e=>e.target.style.borderColor="var(--amber-mid)"}
          onBlur={e=>e.target.style.borderColor="var(--border2)"}
          style={inputStyle}/>
        <input value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={onKey}
          placeholder="Password" type="password"
          autoComplete={mode==="signup"?"new-password":"current-password"}
          onFocus={e=>e.target.style.borderColor="var(--amber-mid)"}
          onBlur={e=>e.target.style.borderColor="var(--border2)"}
          style={inputStyle}/>

        {err&&(
          <div style={{background:"var(--rose-dim)",border:"1px solid rgba(196,122,122,0.25)",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"var(--rose)",fontFamily:"var(--font)"}}>
            {err}
          </div>
        )}

        <button onClick={submit}
          style={{width:"100%",padding:"15px",borderRadius:12,border:"none",background:"var(--amber)",color:"var(--bg)",fontSize:15,fontWeight:600,fontFamily:"var(--font)",letterSpacing:"0.02em",marginTop:4}}>
          {mode==="signup"?"Begin the Journey 📿":"Sign In →"}
        </button>

        <div style={{textAlign:"center",marginTop:16,fontSize:12,color:"var(--text3)",fontFamily:"var(--font)"}}>
          {mode==="signup"?"Already have an account? ":"New here? "}
          <span onClick={()=>{setMode(mode==="signup"?"signin":"signup");setErr("");}}
            style={{color:"var(--amber)",cursor:"pointer",fontWeight:600}}>

        </div>

        <div style={{textAlign:"center",marginTop:24,fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)",letterSpacing:"0.04em",lineHeight:1.6,opacity:0.7}}>
          🔒 Your account &amp; progress are stored privately<br/>on this device.
        </div>
      </div>
    </div>
  );

        <div className="anim-up d1" style={{background:"var(--surface)",borderRadius:20,padding:28,border:"1px solid var(--border)",marginBottom:16,textAlign:"center",position:"relative",overflow:"hidden"}}>
          <div className="geo-pattern" style={{position:"absolute",inset:0,opacity:0.4,pointerEvents:"none"}}/>
          <div style={{position:"relative",zIndex:2}}>
            <IslamicStar size={100} progress={rank.progress} color="var(--amber)">
              <span style={{fontSize:36}}>{rank.icon}</span>
            </IslamicStar>
            <div style={{fontFamily:"var(--arabic)",fontSize:22,color:"var(--amber2)",marginTop:12}}>{rank.arabic}</div>
            <div style={{fontFamily:"var(--serif)",fontSize:18,color:"var(--text)",marginTop:4,fontWeight:400}}>{rank.name}</div>
            <div style={{fontSize:12,color:"var(--text2)",marginTop:6}}>
              {totalXP} XP{rank.next?` · ${rank.next.min-totalXP} to ${rank.next.name}`:" · Highest Station"}
            </div>
          </div>
        </div>

        {/* Stats */}
        <div className="anim-up d2" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
          {[
            {v:totalCompletions,l:"Completions",i:"📿"},
            {v:streak,l:"Day Streak",i:"🔥"},
            {v:completedDhikr.length,l:"Today",i:"✨"},
          ].map((s,i)=>(
            <div key={i} style={{background:"var(--surface)",borderRadius:12,padding:"16px 10px",border:"1px solid var(--border)",textAlign:"center"}}>
              <div style={{fontSize:18,marginBottom:4}}>{s.i}</div>
              <div style={{fontSize:20,fontWeight:600,color:"var(--amber)",fontFamily:"var(--serif)"}}>{s.v}</div>
              <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* Activity over time */}
        <div className="anim-up d3" style={{background:"var(--surface)",borderRadius:16,padding:20,border:"1px solid var(--border)",marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:11,color:"var(--amber)",fontFamily:"var(--font)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.1em"}}>Last 14 Days</div>
            <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font)"}}>{activeDays} active {activeDays===1?"day":"days"}</div>
          </div>
          {data.history.length===0?(
            <div style={{textAlign:"center",padding:"20px 0",fontSize:12,color:"var(--text3)",fontFamily:"var(--body)",lineHeight:1.6}}>
              Your journey starts today.<br/>Complete a dhikr to begin tracking your progress over time. 🌱
            </div>
          ):(
            <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",gap:4,height:110}}>
              {series.map((s,i)=>{
                const h=s.completions>0?Math.max(8,Math.round((s.completions/maxC)*90)):3;
                const today=s.date===todayStr();
                const dayNum=parseInt(s.date.slice(8),10);
                return(
                  <div key={s.date} title={`${s.date} — ${s.completions} dhikr`} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,height:"100%",justifyContent:"flex-end"}}>
                    {s.completions>0&&<div style={{fontSize:9,color:today?"var(--amber2)":"var(--text3)",fontFamily:"var(--mono)"}}>{s.completions}</div>}
                    <div style={{width:"100%",maxWidth:14,height:h,borderRadius:4,
                      background:s.completions>0?(today?"var(--amber)":"var(--green)"):"var(--raised)",
                      boxShadow:s.completions>0?`0 0 8px ${today?"var(--amber-glow)":"var(--green-glow)"}`:"none",
                      transition:"height 0.5s var(--ease)"}}/>
                    <div style={{fontSize:8,color:today?"var(--amber)":"var(--text3)",fontFamily:"var(--mono)"}}>{dayNum}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Stations of the Soul */}
        <div className="anim-up d3" style={{background:"var(--surface)",borderRadius:16,padding:20,border:"1px solid var(--border)",marginBottom:16}}>
          <div style={{fontSize:11,color:"var(--amber)",fontFamily:"var(--font)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>Stations of the Soul</div>
          {RANKS.map((r,i)=>{
            const reached=totalXP>=r.min;
            const current=rank.level===r.level;
            return(
              <div key={r.level} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<RANKS.length-1?"1px solid var(--border)":"none",opacity:reached?1:0.35}}>
                <div style={{width:36,height:36,borderRadius:10,background:current?"var(--amber-dim)":"var(--raised)",border:`1px solid ${current?"var(--amber-mid)":"var(--border)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{r.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:reached?600:400,color:current?"var(--amber2)":"var(--text)"}}>{r.name}</div>
                  <div style={{fontFamily:"var(--arabic)",fontSize:13,color:"var(--text3)",direction:"rtl",textAlign:"left"}}>{r.arabic}</div>
                </div>
                <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font)"}}>{r.min} XP</div>
              </div>
            );
          })}
        </div>

        {/* Ghazali Quote */}
        <div className="anim-up d4" style={{background:"linear-gradient(135deg,var(--bg2),var(--surface))",borderRadius:16,padding:24,border:"1px solid var(--amber-dim)",textAlign:"center"}}>
          <div style={{fontSize:11,color:"var(--amber)",fontFamily:"var(--mono)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12}}>Imam Al-Ghazali</div>
          <p style={{fontFamily:"var(--serif)",fontSize:16,fontStyle:"italic",lineHeight:1.7,color:"var(--text)",fontWeight:300}}>
            "The heart is like a mirror. When it is polished with dhikr, it reflects the light of the Divine. When it is neglected, it gathers rust until nothing of truth can be seen."
          </p>
          <div style={{fontSize:11,color:"var(--text3)",marginTop:10}}>— Ihya Ulum al-Din</div>
        </div>
      </div>
    );
  }

  // ─── LEARN PAGE ────────────────────────────────────────────
  function LearnPage(){
    return(
      <div style={{height:"100%",overflowY:"auto",padding:"16px 16px 100px"}}>
        <div className="anim-up" style={{marginBottom:24}}>
          <div style={{fontSize:11,color:"var(--amber)",fontFamily:"var(--font)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:6}}>Knowledge</div>
          <div style={{fontFamily:"var(--serif)",fontSize:26,fontWeight:400}}>The Science of Dhikr</div>
        </div>

        {ADHKAR.map((d,i)=>(
          <div key={d.id} className={`anim-up d${Math.min(i+1,5)}`}
            onClick={()=>setShowDetail(d)}
            style={{background:"var(--surface)",borderRadius:14,padding:18,border:"1px solid var(--border)",marginBottom:10,cursor:"pointer",transition:"border-color 0.2s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="var(--amber-mid)"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
            <div style={{display:"flex",alignItems:"flex-start",gap:14}}>
              <div style={{width:44,height:44,borderRadius:12,background:"var(--amber-dim)",border:"1px solid var(--amber-mid)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{d.icon}</div>
              <div>
                <div style={{fontFamily:"var(--arabic)",fontSize:20,color:"var(--amber2)",direction:"rtl",textAlign:"left",lineHeight:1.3}}>{d.arabic}</div>
                <div style={{fontSize:14,fontWeight:500,color:"var(--text)",marginTop:4}}>{d.transliteration}</div>
                <div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>{d.meaning}</div>
                <div style={{fontSize:10,color:"var(--amber)",marginTop:6,fontFamily:"var(--font)",textTransform:"uppercase",letterSpacing:"0.08em"}}>{d.category} · Tap to learn more →</div>
              </div>
            </div>
          </div>
        ))}
      </div>
    );
  }

  // ─── DHIKR DETAIL MODAL ────────────────────────────────────
  function DhikrDetail(){
    if(!showDetail)return null;
    const d=showDetail;
    const done=completedDhikr.includes(d.id);
    return(
      <div onClick={()=>setShowDetail(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(12px)",zIndex:150,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:480,background:"var(--bg2)",borderRadius:"20px 20px 0 0",padding:"28px 24px env(safe-area-inset-bottom,24px)",maxHeight:"85vh",overflowY:"auto",border:"1px solid var(--border2)",borderBottom:"none",animation:"slideUp 0.35s var(--ease)"}}>
          <div style={{width:40,height:4,borderRadius:2,background:"var(--border2)",margin:"0 auto 24px"}}/>

          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:40,marginBottom:8}}>{d.icon}</div>
            <div style={{fontFamily:"var(--arabic)",fontSize:32,color:"var(--amber2)",direction:"rtl",lineHeight:1.3}}>{d.arabic}</div>
            <div style={{fontFamily:"var(--serif)",fontSize:18,color:"var(--text)",marginTop:6,fontStyle:"italic"}}>{d.transliteration}</div>
            <div style={{fontSize:13,color:"var(--text2)",marginTop:4}}>{d.meaning}</div>
          </div>

          <div style={{background:"var(--surface)",borderRadius:12,padding:18,marginBottom:16,border:"1px solid var(--border)"}}>
            <div style={{fontSize:10,color:"var(--amber)",fontFamily:"var(--font)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Significance</div>
            <p style={{fontFamily:"var(--body)",fontSize:14,lineHeight:1.75,color:"var(--text)"}}>{d.significance}</p>
          </div>

          <div style={{background:"var(--surface)",borderRadius:12,padding:18,marginBottom:20,border:"1px solid var(--amber-dim)"}}>
            <div style={{fontSize:10,color:"var(--amber)",fontFamily:"var(--font)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Imam Al-Ghazali</div>
            <p style={{fontFamily:"var(--serif)",fontSize:14,fontStyle:"italic",lineHeight:1.75,color:"var(--text2)"}}>{d.ghazali}</p>
          </div>

          <div style={{display:"flex",gap:10}}>
            {!done&&(
              <button onClick={()=>{setShowDetail(null);setActiveTasbih(d)}} style={{flex:1,padding:"14px",borderRadius:10,border:"none",background:"var(--amber)",color:"var(--bg)",fontSize:14,fontWeight:600,fontFamily:"var(--font)"}}>
                Start Counting · {d.target}{d.unit?" "+d.unit:"×"} 📿
              </button>
            )}
            <button onClick={()=>setShowDetail(null)} style={{flex:done?1:0,minWidth:52,padding:"14px",borderRadius:10,border:"1px solid var(--border2)",background:"var(--surface)",color:"var(--text2)",fontSize:13,fontFamily:"var(--font)"}}>
              {done?"MashaAllah ✅":"Close"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ─── RENDER ────────────────────────────────────────────────
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"var(--bg)",maxWidth:480,margin:"0 auto",position:"relative"}}>
      {/* Ambient */}
      <div style={{position:"fixed",top:"20%",left:"50%",transform:"translateX(-50%)",width:400,height:300,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(52,180,100,0.04),transparent 70%)",pointerEvents:"none",zIndex:0}}/>

      {/* Content */}
      <div style={{flex:1,overflow:"hidden",position:"relative",zIndex:1}}>
        {page==="home"&&<HomePage/>}
        {page==="progress"&&<ProgressPage/>}
        {page==="learn"&&<LearnPage/>}
      </div>

      {/* Tasbih counter overlay */}
      {activeTasbih&&<TasbihCounter dhikr={activeTasbih} onComplete={completeDhikr} onClose={()=>setActiveTasbih(null)}/>}

      {/* Detail modal */}
      <DhikrDetail/>

      {/* Bottom nav */}
      <nav style={{display:"flex",justifyContent:"space-around",padding:"8px 0 env(safe-area-inset-bottom,8px)",background:"rgba(6,15,10,0.95)",backdropFilter:"blur(20px)",borderTop:"1px solid var(--border2)",position:"relative",zIndex:50}}>
        {[
          {k:"home",icon:"🕌",label:"Challenge"},
          {k:"progress",icon:"📿",label:"Journey"},
          {k:"learn",icon:"📖",label:"Learn"},
        ].map(n=>(
          <button key={n.k} onClick={()=>setPage(n.k)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",padding:"6px 20px",borderRadius:8,
            color:page===n.k?"var(--green2)":"var(--text3)",fontFamily:"var(--font)",fontSize:10,fontWeight:page===n.k?600:400,transition:"color 0.2s"}}>
            <span style={{fontSize:20,filter:page===n.k?"drop-shadow(0 0 6px var(--green-glow))":"none"}}>{n.icon}</span>
            {n.label}
          </button>
        ))}
      </nav>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════
// ROOT — gates the experience behind the login screen
// ═════════════════════════════════════════════════════════════════════
function Root(){
  const[session,setSession]=useState(()=>{
    const s=loadSession();
    return (s&&loadUsers()[s])?s:null;   // ignore stale sessions
  });
  const logout=()=>{saveSession(null);setSession(null);};
  if(!session) return <LoginScreen onAuth={setSession}/>;
  // key={session} remounts App with the signed-in user's saved progress
  return <App key={session} session={session} onLogout={logout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
